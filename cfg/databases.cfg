# databases.cfg
# ********************************************************************************************************
# if in database exists view dbadm.session_info_v
# session_sysinfo_query= = "SELECT current_database,current_user,version,sid from dbadm.session_info_v;"
# ********************************************************************************************************

[global]
directory_config=

[logging]
# allowed values: True or False
logging_sysinfo=False
logging_sqlcommand=False

[postgresql]
dbadm_syslog_table_name="dbadm.sys_log"

dbadm_session_info_query="SELECT current_database() as current_database,
                               current_user as current_user,
                               substr(version(),1,position('(' in version())-1) as version,
                               pg_backend_pid() as sid;"

[oracle]
client_lib_dir="C:\app\oracle\product\instantclient_23_4"
client_tns_admin = "D:\80-oraDBA\Gdisk\_config\TNS_ADMIN"

dbadm_syslog_table_name="dbadm.sys_log"

dbadm_session_info_query="SELECT SYS_CONTEXT ('USERENV', 'INSTANCE_NAME') as current_database,
                             SYS_CONTEXT ('USERENV', 'SESSION_USER') as current_user,
                             (select 'Oracle '||version_full from v$instance) as version,
                             SYS_CONTEXT ('USERENV', 'SID') as sid
                        FROM dual;"
